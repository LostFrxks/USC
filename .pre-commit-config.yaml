repos:
  - repo: local
    hooks:
      - id: check-encoding-mojibake
        name: check-encoding-mojibake
        entry: python scripts/check_encoding.py
        language: system
        pass_filenames: false
      - id: check-no-generated-artifacts
        name: check-no-generated-artifacts
        entry: python scripts/check_no_generated_artifacts.py
        language: system
        pass_filenames: false
