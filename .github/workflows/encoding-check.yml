name: Encoding Check

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  check-encoding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Run encoding/mojibake check
        run: python scripts/check_encoding.py
