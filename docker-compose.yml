services:
  postgres:
    image: postgres:16-alpine
    container_name: usc-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-usc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-usc123}
      POSTGRES_DB: ${POSTGRES_DB:-usc_db}
    ports:
      - "5432:5432"
    volumes:
      - usc_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-usc} -d ${POSTGRES_DB:-usc_db}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: usc-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - usc_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  backend:
    build:
      context: ./backend
    container_name: usc-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg2://usc:usc123@postgres:5432/usc_db}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      REDIS_PREFIX: ${REDIS_PREFIX:-usc}
      REDIS_TIMEOUT_SECONDS: ${REDIS_TIMEOUT_SECONDS:-1.5}
      API_PREFIX: ${API_PREFIX:-/api}
      CORS_ALLOW_ORIGINS: ${CORS_ALLOW_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
      CORS_ALLOW_ORIGIN_REGEX: ${CORS_ALLOW_ORIGIN_REGEX:-^https?://(?:localhost|127\\.0\\.0\\.1|\\d{1,3}(?:\\.\\d{1,3}){3})(?::\\d+)?$}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:?JWT_SECRET_KEY is required}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_EXPIRES_MINUTES: ${ACCESS_TOKEN_EXPIRES_MINUTES:-60}
      REFRESH_TOKEN_EXPIRES_DAYS: ${REFRESH_TOKEN_EXPIRES_DAYS:-30}
      EMAIL_CODE_EXPIRES_SECONDS: ${EMAIL_CODE_EXPIRES_SECONDS:-300}
      EMAIL_CODE_LENGTH: ${EMAIL_CODE_LENGTH:-6}
      EMAIL_CODE_DEV_FALLBACK: ${EMAIL_CODE_DEV_FALLBACK:-false}
      AUTO_SEED_DEMO: ${AUTO_SEED_DEMO:-false}
      METRICS_ENABLED: ${METRICS_ENABLED:-true}
      SENTRY_DSN_BACKEND: ${SENTRY_DSN_BACKEND:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-dev}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.0}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=2)\""]
      interval: 5s
      timeout: 3s
      retries: 30
    working_dir: /app
    command: >
      sh -c "alembic upgrade head &&
             if [ \"${AUTO_SEED_DEMO:-false}\" = \"true\" ]; then python scripts/seed_demo.py; fi &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
    container_name: usc-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    environment:
      VITE_API_BASE: ${VITE_API_BASE:-/api}
      VITE_PROXY_TARGET: ${VITE_PROXY_TARGET:-http://backend:8000}
      VITE_SENTRY_DSN_FRONTEND: ${VITE_SENTRY_DSN_FRONTEND:-}
      VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-dev}
      VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE:-}
      VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.0}
    ports:
      - "5173:5173"
    working_dir: /app
    command: >
      sh -c "npm run build && npm run preview -- --host=0.0.0.0 --port=5173 --strictPort"

volumes:
  usc_pg_data:
  usc_redis_data:
