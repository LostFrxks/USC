services:
  backend:
    environment:
      EMAIL_CODE_DEV_FALLBACK: "true"
      AUTO_SEED_DEMO: "false"
    volumes:
      - ./backend:/app
    command: >
      sh -c "alembic upgrade head &&
             if [ \"${AUTO_SEED_DEMO:-false}\" = \"true\" ]; then python scripts/seed_demo.py; fi &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    environment:
      VITE_PROXY_TARGET: http://backend:8000
      VITE_API_BASE: /api
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: >
      sh -c "npm run dev -- --host=0.0.0.0 --port=5173 --strictPort"

